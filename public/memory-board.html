<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта воспоминаний - CollabBoard</title>
    <link rel="stylesheet" href="styles/auth.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f0f1a;
        }
        
        #graph-container {
            width: 100vw;
            height: 100vh;
            background: #0f0f1a;
            position: relative;
        }
        
        .controls-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #8a2be2;
            border-radius: 15px;
            padding: 15px;
            color: white;
            max-width: 250px;
        }
        
        .controls-panel h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .controls-panel button {
            background: linear-gradient(45deg, #00ff88, #8a2be2);
            color: #0f0f1a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 5px 0;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }
        
        .controls-panel button.secondary {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .controls-panel button.secondary:hover {
            background: rgba(255, 68, 68, 0.1);
        }
        
        .board-info {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00ff88;
            border-radius: 15px;
            padding: 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .board-info h2 {
            color: #00ff88;
            margin: 0;
            font-size: 1.2rem;
        }
        
        .back-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-btn:hover {
            background: #ff6666;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #1a1a2e;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #8a2be2;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close {
            color: #b0b0c0;
            font-size: 28px;
            cursor: pointer;
        }
        
        .close:hover {
            color: #00ff88;
        }
        
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal-btn.primary {
            background: linear-gradient(45deg, #00ff88, #8a2be2);
            color: #0f0f1a;
        }
        
        .modal-btn.secondary {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .color-picker {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .color-option.selected {
            border-color: white;
            transform: scale(1.1);
        }
        
        .node-tooltip {
            position: absolute;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 10px;
            color: white;
            max-width: 200px;
            pointer-events: none;
            z-index: 1500;
        }
    </style>
</head>
<body>
    <div class="board-info">
        <h2 id="boardTitle">Загрузка...</h2>
        <a href="boards.html" class="back-btn">← К доскам</a>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
    
    <div class="controls-panel">
        <h3>🕸️ Режим "Воспоминания"</h3>
        <button onclick="showAddNodeModal()">➕ Добавить вершину</button>
        <button onclick="enableConnectionMode()" id="connectBtn">🔗 Соединить вершины</button>
        <button class="secondary" onclick="showConfirm('Сбросить вид', 'Вернуть камеру в исходное положение?', resetView)">🎯 Сбросить вид</button>
        <p style="font-size: 0.8rem; color: #b0b0c0; margin-top: 10px;">
            Перетаскивайте вершины мышью<br>
            Клик по вершине — редактировать
        </p>
    </div>
    
    <div id="graph-container"></div>
    
    <!-- Модальное окно добавления/редактирования вершины -->
    <div id="nodeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="nodeModalTitle">Добавить вершину</h2>
                <span class="close" onclick="hideNodeModal()">&times;</span>
            </div>
            <input type="text" id="nodeLabel" placeholder="Название вершины">
            
            <select id="nodeType">
                <option value="text">📝 Текстовая заметка</option>
                <option value="image">🖼️ Изображение</option>
                <option value="note">📌 Простая заметка</option>
            </select>
            
            <textarea id="nodeContent" placeholder="Содержимое (текст или ссылка на изображение)"></textarea>
            
            <p style="color: #b0b0c0; margin: 5px 0;">Цвет вершины:</p>
            <div class="color-picker" id="colorPicker">
                <div class="color-option" style="background: #8a2be2;" data-color="#8a2be2"></div>
                <div class="color-option" style="background: #00ff88;" data-color="#00ff88"></div>
                <div class="color-option" style="background: #ff4444;" data-color="#ff4444"></div>
                <div class="color-option" style="background: #ffaa00;" data-color="#ffaa00"></div>
                <div class="color-option" style="background: #00ccff;" data-color="#00ccff"></div>
                <div class="color-option" style="background: #ff66b2;" data-color="#ff66b2"></div>
            </div>
            
            <input type="hidden" id="editingNodeId">
            
            <div class="modal-actions">
                <button class="modal-btn primary" onclick="saveNode()">Сохранить</button>
                <button class="modal-btn secondary" onclick="deleteNode(document.getElementById('editingNodeId').value)" id="deleteNodeBtn" style="background: #ff4444; color: white; border: none;">🗑️ Удалить</button>
                <button class="modal-btn secondary" onclick="hideNodeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <div class="modal-header">
                <h2 id="confirmTitle">Подтверждение</h2>
                <span class="close" onclick="hideConfirmModal()">&times;</span>
            </div>
            <p id="confirmMessage" style="margin: 20px 0; color: #b0b0c0;">Вы уверены?</p>
            <div class="modal-actions">
                <button class="modal-btn primary" id="confirmOkBtn">Да</button>
                <button class="modal-btn secondary" onclick="hideConfirmModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <!-- 🔥 НОВОЕ: Подключаем Socket.io и наш менеджер сокетов -->
    <!-- Эти скрипты должны быть до основного кода, чтобы класс SocketManager был доступен -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/socket-manager.js"></script>
    <!-- 👇 КОНЕЦ НОВОГО -->

    <script>
        // ========== НАСТРОЙКИ ==========
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Получаем ID доски из URL
        const urlParams = new URLSearchParams(window.location.search);
        const boardId = urlParams.get('id');
        
        if (!boardId) {
            window.location.href = 'boards.html';
        }
        
        const API_URL = '/api/boards';
        
        // Переменные состояния
        let cy = null;
        let connectionMode = false;
        let selectedNodeForConnection = null;
        let currentBoardTitle = '';
        let boardSocket = null;
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBoardInfo();
            await loadGraph();
            initCytoscape();
            
            // 🔥 НОВОЕ: Инициализация сокетов после загрузки доски
            if (token && boardId) {
                console.log('🔌 Инициализация SocketManager для доски', boardId);
                boardSocket = new SocketManager(boardId, token);
                boardSocket.connect();
                
                // Подписываемся на обновления от других пользователей
                boardSocket.onUpdate((updateData) => {
                    console.log('🔄 Изменения в графе от другого пользователя:', updateData);
                    handleGraphUpdate(updateData);
                });
            }
            // 👇 КОНЕЦ НОВОГО
        });
        
        // Загрузка информации о доске
        async function loadBoardInfo() {
            try {
                const response = await fetch(`${API_URL}/${boardId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('boardTitle').textContent = data.board.title;
                    currentBoardTitle = data.board.title;
                }
            } catch (error) {
                console.error('Error loading board info:', error);
            }
        }
        
        // Загрузка данных графа
        async function loadGraph() {
            try {
                const response = await fetch(`${API_URL}/${boardId}/graph`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    console.error('Статус ответа:', response.status);
                    const errorText = await response.text();
                    console.error('Текст ошибки:', errorText);
                    return { nodes: [], edges: [] };
                }
                
                const data = await response.json();
                
                if (data.success && data.graph) {
                    return data.graph;
                }
                return { nodes: [], edges: [] };
            } catch (error) {
                console.error('Error loading graph:', error);
                return { nodes: [], edges: [] };
            }
        }
        
        // Инициализация Cytoscape
        async function initCytoscape() {
            const graphData = await loadGraph();
            
            // Конвертируем наши данные в формат Cytoscape
            const elements = [];
            
            graphData.nodes.forEach(node => {
                elements.push({
                    data: { 
                        id: node.id, 
                        label: node.label,
                        type: node.type,
                        content: node.content,
                        color: node.color || '#8a2be2'
                    },
                    position: { x: node.x, y: node.y }
                });
            });
            
            graphData.edges.forEach(edge => {
                elements.push({
                    data: { 
                        id: edge.id, 
                        source: edge.source, 
                        target: edge.target,
                        label: edge.label || ''
                    }
                });
            });
            
            cy = cytoscape({
                container: document.getElementById('graph-container'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': 'data(color)',
                            'label': 'data(label)',
                            'color': 'white',
                            'text-outline-color': '#1a1a2e',
                            'text-outline-width': '2px',
                            'font-size': '12px',
                            'width': '60px',
                            'height': '60px',
                            'shape': function(ele) {
                                // Если это картинка — делаем квадрат со скруглёнными углами
                                if (ele.data('type') === 'image') {
                                    return 'round-rectangle'; // прямоугольник со скруглёнными углами
                                }
                                return 'ellipse'; // иначе круг
                            },
                            'border-color': '#00ff88',
                            'border-width': '2px',
                            'border-opacity': '0.5',
                            'background-image': function(ele) {
                                if (ele.data('type') === 'image' && ele.data('content')) {
                                    return ele.data('content');
                                }
                                return null;
                            },
                            'background-fit': 'cover',
                            'background-clip': 'none',
                            'background-image-opacity': 1,
                            'text-valign': 'bottom',   // текст снизу
                            'text-halign': 'center',    // текст по центру
                            'text-margin-y': '10px'     // отступ текста от вершины
                        }
                    },
                    {
                        selector: 'node:selected',
                        style: {
                            'border-color': '#ffaa00',
                            'border-width': '3px',
                            'overlay-opacity': 0
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': '3px',
                            'line-color': '#8a2be2',
                            'target-arrow-color': '#8a2be2',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'opacity': '0.7'
                        }
                    },
                    {
                        selector: 'edge:selected',
                        style: {
                            'line-color': '#ff4444',
                            'width': '4px'
                        }
                    }
                ],
                layout: {
                    name: 'preset'
                },
                userZoomingEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: true,
                selectionType: 'single'
            });
            
            // Обработчик клика по вершине
            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                
                if (connectionMode) {
                    // Режим соединения
                    if (!selectedNodeForConnection) {
                        selectedNodeForConnection = node;
                        node.style('border-color', '#ffaa00');
                        node.style('border-width', '4px');
                    } else if (selectedNodeForConnection.id() !== node.id()) {
                        // Соединяем вершины
                        createEdge(selectedNodeForConnection.id(), node.id());
                        selectedNodeForConnection.style('border-color', '#00ff88');
                        selectedNodeForConnection.style('border-width', '2px');
                        selectedNodeForConnection = null;
                        connectionMode = false;
                        document.getElementById('connectBtn').textContent = '🔗 Соединить вершины';
                    }
                } else {
                    // Обычный режим - редактирование
                    showEditNodeModal(node);
                }
            });
            
            // Обработчик клика по ребру
            cy.on('tap', 'edge', function(evt) {
                const edge = evt.target;
                showConfirm('Удалить связь', 'Удалить эту связь между вершинами?', () => {
                    deleteEdge(edge.id());
                });
            });
            
            // Обработчик перемещения вершины
            cy.on('dragfree', 'node', function(evt) {
                const node = evt.target;
                const position = node.position();
                updateNodePosition(node.id(), position);
            });
            
            // Обработчик клика по пустому месту
            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    if (selectedNodeForConnection) {
                        selectedNodeForConnection.style('border-color', '#00ff88');
                        selectedNodeForConnection.style('border-width', '2px');
                        selectedNodeForConnection = null;
                        connectionMode = false;
                        document.getElementById('connectBtn').textContent = '🔗 Соединить вершины';
                    }
                }
            });
        }
        
        // Вызывается, когда приходит обновление от другого пользователя
        // Функция-обработчик для всех событий графа
        function handleGraphUpdate(updateData) {
            console.log('🔄 Обработка обновления графа:', updateData.type);
            
            switch (updateData.type) {
                case 'node-added':
                    // Добавляем вершину в граф
                    cy.add({
                        group: 'nodes',
                        data: updateData.node.data,
                        position: updateData.node.position
                    });
                    console.log('✅ Вершина добавлена через сокет');
                    break;
                    
                case 'node-deleted':
                    cy.getElementById(updateData.nodeId).remove();
                    console.log('✅ Вершина удалена через сокет');
                    break;
                    
                case 'node-edited':
                    console.log('🔍 Получено редактирование вершины:', updateData);
                    const nodeToEdit = cy.getElementById(updateData.nodeId);
                    console.log('🔍 Найдена вершина?', nodeToEdit.length > 0 ? 'Да' : 'Нет');
                    
                    if (nodeToEdit.length > 0) {
                        // Обновляем данные вершины
                        nodeToEdit.data('label', updateData.label);
                        nodeToEdit.data('type', updateData.nodeType);
                        nodeToEdit.data('content', updateData.content);
                        nodeToEdit.data('color', updateData.color);
                        nodeToEdit.style('background-color', updateData.color);
                        console.log('✅ Вершина отредактирована через сокет:', updateData.nodeId);
                    } else {
                        console.warn('⚠️ Вершина не найдена для редактирования:', updateData.nodeId);
                    }
                    break;
                       
                case 'node-moved':
                    const nodeToMove = cy.getElementById(updateData.nodeId);
                    if (nodeToMove.length > 0) {
                        nodeToMove.position({
                            x: updateData.x,
                            y: updateData.y
                        });
                        console.log('✅ Вершина перемещена через сокет');
                    } else {
                        console.warn('⚠️ Вершина не найдена для перемещения:', updateData.nodeId);
                    }
                    break;
                    
                case 'edge-added':
                    cy.add({
                        group: 'edges',
                        data: updateData.edge.data
                    });
                    console.log('✅ Связь добавлена через сокет');
                    break;
                    
                case 'edge-deleted':
                    cy.getElementById(updateData.edgeId).remove();
                    console.log('✅ Связь удалена через сокет');
                    break;
                    
                default:
                    console.log('Неизвестный тип обновления:', updateData.type);
            }
        }
        
        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ВЕРШИНАМИ ==========
        
        function showAddNodeModal() {
            document.getElementById('nodeModalTitle').textContent = 'Добавить вершину';
            document.getElementById('nodeLabel').value = '';
            document.getElementById('nodeType').value = 'text';
            document.getElementById('nodeContent').value = '';
            document.getElementById('editingNodeId').value = '';
            
            // Выбираем цвет по умолчанию
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.color === '#8a2be2') {
                    opt.classList.add('selected');
                }
            });
            
            document.getElementById('nodeModal').style.display = 'block';
            document.getElementById('deleteNodeBtn').style.display = 'none';
        }
        
        function showEditNodeModal(node) {
            document.getElementById('nodeModalTitle').textContent = 'Редактировать вершину';
            document.getElementById('nodeLabel').value = node.data('label');
            document.getElementById('nodeType').value = node.data('type') || 'text';
            document.getElementById('nodeContent').value = node.data('content') || '';
            document.getElementById('editingNodeId').value = node.id();

            // Добавляем подсказку в зависимости от типа
            const contentLabel = document.querySelector('label[for="nodeContent"]');
            if (node.data('type') === 'image') {
                document.getElementById('nodeContent').placeholder = 'Вставьте ссылку на изображение (https://...)';
            } else {
                document.getElementById('nodeContent').placeholder = 'Содержимое (текст или ссылка на изображение)';
            }
            
            // Выбираем цвет вершины
            const nodeColor = node.data('color') || '#8a2be2';
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.color === nodeColor) {
                    opt.classList.add('selected');
                }
            });
            
            document.getElementById('nodeModal').style.display = 'block';
            document.getElementById('deleteNodeBtn').style.display = 'block';
        }

        // Удаление вершины
        async function deleteNode(nodeId) {
            showConfirm(
                'Удаление вершины',
                'Вы уверены, что хотите удалить эту вершину? Все связи с ней тоже будут удалены.',
                async function() {
                    console.log('🗑️ Подтверждено удаление вершины:', nodeId);
                    
                    try {
                        const response = await fetch(`${API_URL}/${boardId}/nodes/${nodeId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        const data = await response.json();
                        console.log('📥 Ответ от сервера при удалении:', data);
                        
                        if (data.success) {
                            // Удаляем вершину из графа
                            cy.getElementById(nodeId).remove();
                            
                            // 🔥 ВАЖНО: Отправляем уведомление остальным
                            if (boardSocket) {
                                boardSocket.sendUpdate({
                                    type: 'node-deleted',
                                    nodeId: nodeId
                                });
                                console.log('📤 Отправлено уведомление об удалении вершины');
                            }
                            
                            // 🔥 ВАЖНО: Закрываем модальное окно
                            hideNodeModal();
                            console.log('✅ Модальное окно закрыто после удаления');
                            
                        } else {
                            alert('Ошибка: ' + data.message);
                        }
                    } catch (error) {
                        console.error('Error deleting node:', error);
                        alert('Ошибка соединения с сервером');
                    }
                }
            );
        }
        
        function hideNodeModal() {
            document.getElementById('nodeModal').style.display = 'none';
            if (selectedNodeForConnection) {
                selectedNodeForConnection.style('border-color', '#00ff88');
                selectedNodeForConnection.style('border-width', '2px');
                selectedNodeForConnection = null;
            }
        }
        
        async function saveNode() {
            const label = document.getElementById('nodeLabel').value.trim();
            const type = document.getElementById('nodeType').value;
            const content = document.getElementById('nodeContent').value.trim();
            const editingNodeId = document.getElementById('editingNodeId').value;
            
            // Получаем выбранный цвет
            let selectedColor = '#8a2be2';
            document.querySelectorAll('.color-option').forEach(opt => {
                if (opt.classList.contains('selected')) {
                    selectedColor = opt.dataset.color;
                }
            });
            
            if (!label) {
                alert('Введите название вершины');
                return;
            }
            
            if (editingNodeId) {
                // Редактирование существующей вершины
                try {
                    const response = await fetch(`${API_URL}/${boardId}/nodes/${editingNodeId}`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ 
                            label, 
                            type, 
                            content, 
                            color: selectedColor 
                        })
                    });
                    
                    const data = await response.json();
                    console.log('📥 Ответ от сервера при редактировании:', data);
                    
                    if (data.success) {
                        // Обновляем вершину в графе - используем правильный синтаксис
                        const nodeToUpdate = cy.$id(editingNodeId); // Вместо getElementById используем $id
                        if (nodeToUpdate.length > 0) {
                            nodeToUpdate.data('label', label);
                            nodeToUpdate.data('type', type);
                            nodeToUpdate.data('content', content);
                            nodeToUpdate.data('color', selectedColor);
                            nodeToUpdate.style('background-color', selectedColor);
                            
                            // 🔥 ВАЖНО: Сообщаем остальным об изменении вершины
                            if (boardSocket) {
                                boardSocket.sendUpdate({
                                    type: 'node-edited',
                                    nodeId: editingNodeId,
                                    label: label,
                                    nodeType: type,
                                    content: content,
                                    color: selectedColor
                                });
                                console.log('📤 Отправлено уведомление об изменении вершины');
                            }
                        } else {
                            console.warn('⚠️ Вершина не найдена в графе:', editingNodeId);
                        }
                        
                        hideNodeModal();
                    } else {
                        alert('Ошибка: ' + data.message);
                    }
                } catch (error) {
                    console.error('Error updating node:', error);
                    alert('Ошибка соединения с сервером');
                }
            } else {
                // Создание новой вершины
                try {
                    const response = await fetch(`${API_URL}/${boardId}/nodes`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ 
                            label, 
                            type, 
                            content,
                            color: selectedColor,
                            x: Math.random() * 500 + 100,
                            y: Math.random() * 300 + 100
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Добавляем вершину в граф
                        cy.add({
                            group: 'nodes',
                            data: { 
                                id: data.node.id, 
                                label: data.node.label,
                                type: data.node.type,
                                content: data.node.content,
                                color: data.node.color || selectedColor
                            },
                            position: { x: data.node.x, y: data.node.y }
                        });
                        
                        // 🔥 НОВОЕ: Сообщаем остальным о новой вершине
                        if (boardSocket) {
                            boardSocket.sendUpdate({
                                type: 'node-added',
                                node: {
                                    data: {
                                        id: data.node.id,
                                        label: data.node.label,
                                        type: data.node.type,
                                        content: data.node.content,
                                        color: data.node.color
                                    },
                                    position: { x: data.node.x, y: data.node.y }
                                }
                            });
                            console.log('📤 Отправлено уведомление о новой вершине');
                        }
                        // 👇 КОНЕЦ НОВОГО
                        
                        hideNodeModal();
                    } else {
                        alert('Ошибка: ' + data.message);
                    }
                } catch (error) {
                    console.error('Error creating node:', error);
                    alert('Ошибка соединения с сервером');
                }
            }
        }
        
        // Храним последнюю позицию для каждой вершины
        let lastPositions = {};

        async function updateNodePosition(nodeId, position) {
            try {
                await fetch(`${API_URL}/${boardId}/nodes/${nodeId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ x: position.x, y: position.y })
                });
                
                // Сообщаем остальным о перемещении
                if (boardSocket) {
                    boardSocket.sendUpdate({
                        type: 'node-moved',
                        nodeId: nodeId,
                        x: position.x,
                        y: position.y
                    });
                    console.log('📤 Отправлено уведомление о перемещении вершины');
                }
            } catch (error) {
                console.error('Error updating node position:', error);
            }
        }
        
        
        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ СО СВЯЗЯМИ ==========
        
        function enableConnectionMode() {
            connectionMode = !connectionMode;
            if (connectionMode) {
                document.getElementById('connectBtn').textContent = '⏹️ Отменить соединение';
                selectedNodeForConnection = null;
            } else {
                document.getElementById('connectBtn').textContent = '🔗 Соединить вершины';
                if (selectedNodeForConnection) {
                    selectedNodeForConnection.style('border-color', '#00ff88');
                    selectedNodeForConnection.style('border-width', '2px');
                    selectedNodeForConnection = null;
                }
            }
        }
        
        async function createEdge(sourceId, targetId) {
            try {
                const response = await fetch(`${API_URL}/${boardId}/edges`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ source: sourceId, target: targetId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    cy.add({
                        group: 'edges',
                        data: { 
                            id: data.edge.id, 
                            source: sourceId, 
                            target: targetId,
                            label: ''
                        }
                    });
                    
                    // 🔥 НОВОЕ: Сообщаем остальным о новой связи
                    if (boardSocket) {
                        boardSocket.sendUpdate({
                            type: 'edge-added',
                            edge: {
                                data: {
                                    id: data.edge.id,
                                    source: sourceId,
                                    target: targetId,
                                    label: ''
                                }
                            }
                        });
                        console.log('📤 Отправлено уведомление о новой связи');
                    }
                    // 👇 КОНЕЦ НОВОГО
                } else {
                    alert('Ошибка создания связи');
                }
            } catch (error) {
                console.error('Error creating edge:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        async function deleteEdge(edgeId) {
            try {
                const response = await fetch(`${API_URL}/${boardId}/edges/${edgeId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    cy.getElementById(edgeId).remove();
                    
                    // 🔥 НОВОЕ: Сообщаем остальным об удалении связи
                    if (boardSocket) {
                        boardSocket.sendUpdate({
                            type: 'edge-deleted',
                            edgeId: edgeId
                        });
                        console.log('📤 Отправлено уведомление об удалении связи');
                    }
                    // 👇 КОНЕЦ НОВОГО
                } else {
                    alert('Ошибка удаления связи');
                }
            } catch (error) {
                console.error('Error deleting edge:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        
        function resetView() {
            cy.fit();
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
        
        // Цветовые опции
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Меняем плейсхолдер при выборе типа
        document.getElementById('nodeType').addEventListener('change', function() {
            const type = this.value;
            const contentInput = document.getElementById('nodeContent');
            if (type === 'image') {
                contentInput.placeholder = 'Вставьте ссылку на изображение (https://...)';
            } else {
                contentInput.placeholder = 'Содержимое (текст или ссылка на изображение)';
            }
        });

        // ========== МОДАЛЬНОЕ ОКНО ПОДТВЕРЖДЕНИЯ ==========
        let confirmCallback = null;
        
        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = onConfirm;
            document.getElementById('confirmModal').style.display = 'block';
        }
        
        function hideConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            confirmCallback = null;
        }
        
        document.getElementById('confirmOkBtn').onclick = function() {
            if (confirmCallback) {
                confirmCallback();
            }
            hideConfirmModal();
        };
        
        window.onclick = function(event) {
            const nodeModal = document.getElementById('nodeModal');
            const confirmModal = document.getElementById('confirmModal');
            
            if (event.target === nodeModal) {
                hideNodeModal();
            }
            if (event.target === confirmModal) {
                hideConfirmModal();
            }
        };
    </script>
</body>
</html>
