<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доска - CollabBoard</title>
    <link rel="stylesheet" href="styles/auth.css">
    <style>
        .board-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .board-title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .board-title {
            font-size: 2rem;
            color: #00ff88;
        }
        
        .edit-title-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #b0b0c0;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .edit-title-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
        
        .add-item-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .add-item-form {
            display: flex;
            gap: 10px;
        }
        
        .add-item-input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        
        .add-item-btn {
            background: linear-gradient(45deg, #00ff88, #8a2be2);
            color: #0f0f1a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .add-item-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,255,136,0.3);
        }
        
        .items-list {
            list-style: none;
            padding: 0;
        }
        
        .item-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }
        
        .item-card:hover {
            border-color: #00ff88;
        }
        
        .item-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .item-text {
            flex: 1;
            font-size: 1.1rem;
        }
        
        .item-text.completed {
            text-decoration: line-through;
            color: #b0b0c0;
        }
        
        .item-actions {
            display: flex;
            gap: 8px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        
        .item-card:hover .item-actions {
            opacity: 1;
        }
        
        .item-edit-btn {
            background: #8a2be2;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .item-delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #1a1a2e;
            margin: 15% auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #8a2be2;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close {
            color: #b0b0c0;
            font-size: 28px;
            cursor: pointer;
        }
        
        .close:hover {
            color: #00ff88;
        }
        
        .modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal-btn.primary {
            background: linear-gradient(45deg, #00ff88, #8a2be2);
            color: #0f0f1a;
        }
        
        .modal-btn.secondary {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00ff88;
        }
        
        .empty-items {
            text-align: center;
            padding: 40px;
            color: #b0b0c0;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff88;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="board-container">
        <div class="board-header">
            <div class="board-title-section">
                <h1 class="board-title" id="boardTitle">Загрузка...</h1>
                <button class="edit-title-btn" onclick="showEditTitleModal()">✏️</button>
            </div>
            <button class="auth-btn secondary" onclick="logout()" style="background: #ff4444; color: white; border: none;">Выйти</button>
        </div>
        
        <div class="add-item-section">
            <div class="add-item-form">
                <input type="text" class="add-item-input" id="newItemText" 
                       placeholder="Добавить задачу...">
                <button class="add-item-btn" onclick="addItem()">Добавить</button>
            </div>
        </div>
        
        <div id="itemsList">
            <div class="loading">Загрузка задач...</div>
        </div>
        
        <div class="auth-footer">
            <a href="boards.html" class="back-link">← Назад к доскам</a>
        </div>
    </div>
    
    <!-- Модальное окно редактирования названия доски -->
    <div id="editTitleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Изменить название</h2>
                <span class="close" onclick="hideEditTitleModal()">&times;</span>
            </div>
            <input type="text" id="editTitleInput" placeholder="Новое название">
            <div class="modal-actions">
                <button class="modal-btn primary" onclick="updateBoardTitle()">Сохранить</button>
                <button class="modal-btn secondary" onclick="hideEditTitleModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно редактирования задачи -->
    <div id="editItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Редактировать задачу</h2>
                <span class="close" onclick="hideEditItemModal()">&times;</span>
            </div>
            <input type="text" id="editItemInput" placeholder="Текст задачи">
            <input type="hidden" id="editItemId">
            <div class="modal-actions">
                <button class="modal-btn primary" onclick="updateItem()">Сохранить</button>
                <button class="modal-btn secondary" onclick="hideEditItemModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Получаем ID доски из URL
        const urlParams = new URLSearchParams(window.location.search);
        const boardId = urlParams.get('id');
        
        if (!boardId) {
            window.location.href = 'boards.html';
        }
        // ... (код получения boardId и token)

        // Глобальная переменная для доступа к сокет-менеджеру из функций
        let boardSocket = null;

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            // ... (твой старый код загрузки доски - loadBoard и т.д.)

            // Инициализация сокетов ПОСЛЕ загрузки данных
            if (token && boardId) {
                boardSocket = new SocketManager(boardId, token);
                boardSocket.connect();

                // Подписываемся на обновления от других пользователей
                boardSocket.onUpdate((updateData) => {
                    console.log('🔄 Изменения от другого пользователя:', updateData);

                    // Смотрим, что за тип обновления пришел
                    if (updateData.type === 'item-added') {
                        // Кто-то добавил задачу
                        appendNewItemToDOM(updateData.item);
                    }

                    // обработка удаления
                    if (updateData.type === 'item-deleted') {
                        removeItemFromDOM(updateData.itemId);
                    }
                    // обработка чекбокса
                    if (updateData.type === 'item-toggled') {
                        toggleItemFromDOM(updateData.itemId, updateData.completed);
                    }
                    // обработка редактирования
                    if (updateData.type === 'item-edited') {
                        updateItemTextInDOM(updateData.itemId, updateData.newText);
                    }
                });
            }
        });

        // Функции addItem, deleteItem, toggleItem, updateBoardTitle, updateItem
        // нужно будет дополнить отправкой обновлений через сокет.
        // Например, в функции addItem ПОСЛЕ успешного fetch, добавим вызов:
        // if (boardSocket) {
        //     boardSocket.sendUpdate({ type: 'item-added', item: data.item });
        // }
        
        const API_URL = '/api/boards';
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
        
        // Загрузка доски
        async function loadBoard() {
            try {
                const response = await fetch(`${API_URL}/${boardId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayBoard(data.board);
                } else {
                    alert('Ошибка загрузки доски');
                    window.location.href = 'boards.html';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        // Отображение доски
        function displayBoard(board) {
            document.getElementById('boardTitle').textContent = board.title;    
            
            const itemsList = document.getElementById('itemsList');
            
            if (!board.content || board.content.length === 0) {
                itemsList.innerHTML = `
                    <div class="empty-items">
                        <p>📭 На этой доске пока нет задач</p>
                        <p>Добавьте первую задачу выше!</p>
                    </div>
                `;
                return;
            }
            
            itemsList.innerHTML = `
                <ul class="items-list">
                    ${board.content.map(item => `
                        <li class="item-card">
                            <input type="checkbox" class="item-checkbox" 
                                   ${item.completed ? 'checked' : ''}
                                   onchange="toggleItem(${item.id}, this)">
                            <span class="item-text ${item.completed ? 'completed' : ''}">
                                ${item.text}
                            </span>
                            <div class="item-actions">
                                <button class="item-edit-btn" onclick="showEditItemModal(${item.id}, '${item.text}')">
                                    ✏️
                                </button>
                                <button class="item-delete-btn" onclick="deleteItem(${item.id})">
                                    🗑️
                                </button>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
        }
        // Функция для добавления одного элемента в список на странице
        function appendNewItemToDOM(item) {
            const itemsList = document.getElementById('itemsList');
            const listElement = itemsList.querySelector('ul'); // Находим существующий <ul>

            // Если список задач пустой, может не быть <ul>. Создадим его, если надо.
            if (!listElement) {
                // Если список пустой, просто перезагрузим всю доску (временное, но надежное решение)
                // Чтобы не усложнять, можно просто вызвать loadBoard()
                // Но для красоты можно создать структуру
                itemsList.innerHTML = `<ul class="items-list"></ul>`;
            }

            // Находим <ul> снова (он теперь точно есть)
            const ul = document.querySelector('.items-list');

            // Создаем HTML для нового элемента (копируем верстку из displayBoard)
            const newItemHtml = `
                <li class="item-card">
                    <input type="checkbox" class="item-checkbox" 
                        ${item.completed ? 'checked' : ''}
                        onchange="toggleItem(${item.id}, this)">
                    <span class="item-text ${item.completed ? 'completed' : ''}">
                        ${item.text}
                    </span>
                    <div class="item-actions">
                        <button class="item-edit-btn" onclick="showEditItemModal(${item.id}, '${item.text}')">
                            ✏️
                        </button>
                        <button class="item-delete-btn" onclick="deleteItem(${item.id})">
                            🗑️
                        </button>
                    </div>
                </li>
            `;

            // Добавляем в конец списка
            ul.insertAdjacentHTML('beforeend', newItemHtml);
        }

        // Удалить элемент из списка на странице
        function removeItemFromDOM(itemId) {
            const itemElement = document.querySelector(`.item-card input[onchange*="toggleItem(${itemId}"]`)?.closest('.item-card');
            // Или проще — ищем по атрибуту, но сложнее. Сделаем проще:
            
            // Перебираем все элементы и ищем тот, у которого в onclick есть нужный itemId
            const items = document.querySelectorAll('.item-card');
            items.forEach(item => {
                const deleteBtn = item.querySelector('.item-delete-btn');
                if (deleteBtn && deleteBtn.getAttribute('onclick')?.includes(`deleteItem(${itemId}`)) {
                    item.remove();
                }
            });
            
            // Если после удаления список стал пустым — показываем заглушку
            const itemsList = document.getElementById('itemsList');
            if (itemsList.querySelectorAll('.item-card').length === 0) {
                itemsList.innerHTML = `
                    <div class="empty-items">
                        <p>📭 На этой доске пока нет задач</p>
                        <p>Добавьте первую задачу выше!</p>
                    </div>
                `;
            }
        }

        // Обновить состояние чекбокса у другого пользователя
        function toggleItemFromDOM(itemId, completed) {
            // Ищем элемент по data-атрибуту или по содержимому
            const checkboxes = document.querySelectorAll('.item-checkbox');
            
            for (let checkbox of checkboxes) {
                // Получаем родительскую карточку
                const itemCard = checkbox.closest('.item-card');
                const deleteBtn = itemCard.querySelector('.item-delete-btn');
                
                // Проверяем, тот ли это item (по тексту в onclick кнопки удаления)
                if (deleteBtn && deleteBtn.getAttribute('onclick')?.includes(`deleteItem(${itemId}`)) {
                    // Меняем состояние чекбокса
                    checkbox.checked = completed;
                    
                    // Меняем стиль текста
                    const itemText = itemCard.querySelector('.item-text');
                    if (completed) {
                        itemText.classList.add('completed');
                    } else {
                        itemText.classList.remove('completed');
                    }
                    break;
                }
            }
        }

        // Обновить текст задачи в DOM
        function updateItemTextInDOM(itemId, newText) {
            // Ищем элемент с этим itemId (по кнопке удаления)
            const items = document.querySelectorAll('.item-card');
            
            for (let item of items) {
                const deleteBtn = item.querySelector('.item-delete-btn');
                if (deleteBtn && deleteBtn.getAttribute('onclick')?.includes(`deleteItem(${itemId}`)) {
                    const textSpan = item.querySelector('.item-text');
                    if (textSpan) {
                        textSpan.textContent = newText;
                    }
                    break;
                }
            }
        }
        
        // Добавить задачу
        async function addItem() {
            const text = document.getElementById('newItemText').value.trim();

            if (!text) {
                alert('Введите текст задачи');
                return;
            }

            try {
                // 1. Отправляем запрос на сервер для сохранения
                const response = await fetch(`${API_URL}/${boardId}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.success) {
                    // 2. Очищаем поле ввода
                    document.getElementById('newItemText').value = '';

                    // 3. ВАЖНО: Добавляем новую задачу в список на странице (без перезагрузки!)
                    //    Для этого нам понадобится функция, которая умеет отрисовывать один элемент
                    appendNewItemToDOM(data.item);

                    // 4. Сообщаем всем остальным через сокет, что добавлен новый элемент
                    if (boardSocket) {
                        boardSocket.sendUpdate({
                            type: 'item-added',
                            item: data.item
                        });
                    } else {
                        console.warn('Сокет не инициализирован, но задача добавлена локально');
                    }

                } else {
                    alert('Ошибка: ' + data.message);
                }
            } catch (error) {
                console.error('Error adding item:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
       // Переключить выполнение задачи
        async function toggleItem(itemId, checkboxElement) {
            // const completed = checkboxElement.checked; // так тоже можно
            const completed = checkboxElement.checked; // получаем состояние
            
            // Сразу меняем стиль на своей странице (без ожидания сервера)
            const itemCard = checkboxElement.closest('.item-card');
            const itemText = itemCard.querySelector('.item-text');
            
            if (completed) {
                itemText.classList.add('completed');
            } else {
                itemText.classList.remove('completed');
            }

            try {
                // Отправляем на сервер
                await fetch(`${API_URL}/${boardId}/items/${itemId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ completed })
                });

                // Сообщаем остальным
                if (boardSocket) {
                    boardSocket.sendUpdate({
                        type: 'item-toggled',
                        itemId: itemId,
                        completed: completed
                    });
                }
            } catch (error) {
                console.error('Error toggling item:', error);
                // Если ошибка — можно вернуть как было
                if (completed) {
                    itemText.classList.remove('completed');
                } else {
                    itemText.classList.add('completed');
                }
                checkboxElement.checked = !completed;
            }
        }
        
       // Удалить задачу
        async function deleteItem(itemId) {
            showConfirm(
                'Удаление задачи',
                'Вы уверены, что хотите удалить эту задачу?',
                async function() {
                    try {
                        const response = await fetch(`${API_URL}/${boardId}/items/${itemId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        const data = await response.json();

                        if (data.success) {
                            // Удаляем элемент из DOM
                            removeItemFromDOM(itemId);

                            // Сообщаем остальным через сокет
                            if (boardSocket) {
                                boardSocket.sendUpdate({
                                    type: 'item-deleted',
                                    itemId: itemId
                                });
                            }
                        } else {
                            alert('Ошибка удаления');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Ошибка соединения с сервером');
                    }
                }
            );
        }
        
        // Модальное окно редактирования названия
        function showEditTitleModal() {
            const currentTitle = document.getElementById('boardTitle').textContent;
            document.getElementById('editTitleInput').value = currentTitle;
            document.getElementById('editTitleModal').style.display = 'block';
        }
        
        function hideEditTitleModal() {
            document.getElementById('editTitleModal').style.display = 'none';
        }
        
        // Обновить название доски
        async function updateBoardTitle() {
            const title = document.getElementById('editTitleInput').value.trim();
            
            if (!title) {
                alert('Введите название');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/${boardId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    hideEditTitleModal();
                    loadBoard(); // Перезагружаем для обновления названия
                } else {
                    alert('Ошибка: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        // Модальное окно редактирования задачи
        function showEditItemModal(itemId, text) {
            document.getElementById('editItemId').value = itemId;
            document.getElementById('editItemInput').value = text;
            document.getElementById('editItemModal').style.display = 'block';
        }
        
        function hideEditItemModal() {
            document.getElementById('editItemModal').style.display = 'none';
        }
        
       // Обновить задачу
        async function updateItem() {
            const itemId = document.getElementById('editItemId').value;
            const text = document.getElementById('editItemInput').value.trim();
            
            if (!text) {
                alert('Введите текст задачи');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/${boardId}/items/${itemId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Обновляем текст на своей странице
                    updateItemTextInDOM(itemId, text);
                    
                    // Сообщаем остальным через сокет
                    if (boardSocket) {
                        boardSocket.sendUpdate({
                            type: 'item-edited',
                            itemId: itemId,
                            newText: text
                        });
                    }
                    
                    hideEditItemModal();
                } else {
                    alert('Ошибка: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        // Загружаем доску при старте
        document.addEventListener('DOMContentLoaded', loadBoard);
        
        // Закрытие модальных окон по клику вне
        window.onclick = function(event) {
            const titleModal = document.getElementById('editTitleModal');
            const itemModal = document.getElementById('editItemModal');
            
            if (event.target === titleModal) {
                hideEditTitleModal();
            }
            if (event.target === itemModal) {
                hideEditItemModal();
            }
        }
    </script>
        <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 350px;">
            <div class="modal-header">
                <h2 id="confirmTitle">Подтверждение</h2>
                <span class="close" onclick="hideConfirmModal()">&times;</span>
            </div>
            <p id="confirmMessage" style="margin: 20px 0; color: #b0b0c0;">Вы уверены?</p>
            <div class="modal-actions">
                <button class="modal-btn primary" id="confirmOkBtn">Да, удалить</button>
                <button class="modal-btn secondary" onclick="hideConfirmModal()">Отмена</button>
            </div>
        </div>
    </div>

    <style>
        /* Стили для модального окна подтверждения */
        #confirmModal .modal-content {
            background: #1a1a2e;
            border: 1px solid #ff4444;
        }
        #confirmModal .modal-btn.primary {
            background: #ff4444;
            color: white;
        }
        #confirmModal .modal-btn.primary:hover {
            background: #ff6666;
            transform: translateY(-2px);
        }
    </style>
    <script>
    // Переменные для хранения callback функций
        let confirmCallback = null;
        
        // Показать модальное окно подтверждения
        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = onConfirm;
            document.getElementById('confirmModal').style.display = 'block';
        }
        
        // Скрыть модальное окно
        function hideConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            confirmCallback = null;
        }
        
        // Обработчик кнопки "Да"
        document.getElementById('confirmOkBtn').onclick = function() {
            if (confirmCallback) {
                confirmCallback();
            }
            hideConfirmModal();
        };
        
        // Закрытие по клику вне окна
        window.onclick = function(event) {
            const modal = document.getElementById('confirmModal');
            if (event.target === modal) {
                hideConfirmModal();
            }
        }
    </script>
